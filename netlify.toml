[build]
  command = "npm run build"
  publish = ".next"

# NEXT_PUBLIC_ vars are intentionally bundled into the client — that's the whole
# point of the prefix. Netlify's secrets scanner doesn't know this, so we tell it
# to skip them explicitly.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/verify/:certId"
  to   = "/verify/?id=:certId"
  status = 301
  force  = false
